Args = \
       --features=com.oracle.svm.libjvm.buildtime.LibJVMFeature \
       --add-exports=jdk.compiler/com.sun.tools.javac.launcher=org.graalvm.nativeimage.builder \
       --add-modules=java.xml,java.xml.crypto,java.logging \
       --enable-url-protocols=jrt,http \
       --future-defaults=run-time-initialize-security-providers \
       --initialize-at-run-time=jdk.internal.loader.ClassLoaders \
       --initialize-at-run-time=com.sun.tools.javac \
       --initialize-at-run-time=com.sun.tools.javac.file \
       --initialize-at-run-time=com.sun.source \
       --initialize-at-run-time=jdk.javadoc.internal \
       --initialize-at-run-time=com.sun.tools.doclint \
       --initialize-at-run-time=jdk.jshell.tool \
       -H:+UnlockExperimentalVMOptions \
       -H:+RuntimeClassLoading \
       -H:MaxMetaspaceSize=128m \
       -H:+AllowJRTFileSystem \
       -H:+GraalJITCompileAtRuntime \
       -H:-LegacyJavaOptionMode \
       -H:-UnlockExperimentalVMOptions

# Remarks

# -H:-LegacyJavaOptionMode intentionally breaks compatibility for recognized but unimplemented
# Java options. Failing fast keeps the remaining full-compatibility work visible instead of
# silently deviating from the user's requested launch configuration (GR-75297).

# --add-exports=jdk.compiler/com.sun.tools.javac.launcher=org.graalvm.nativeimage.builder
# Needed so that LibJVMMainMethodWrappers can call SourceLauncher.main methods. Can be removed once GR-71358 is done

# --add-modules=java.xml,java.xml.crypto,java.logging
# Makes the selected JDK module readers available for runtime class/resource loading from lib/modules.
# When RuntimeClassLoading is enabled, JavaxXmlClassAndResourcesLoaderFeature only registers XML
# implementation metadata for implementation classes that are independently AOT-reachable.
#
# --enable-url-protocols=jrt,http
# The runtime-loaded java.xml module initializes the JDK XML catalog from a jrt: URL. It also
# validates and resolves catalog and external-access entries that use http: URLs.
#
# --future-defaults=run-time-initialize-security-providers
# Lets security providers from runtime-loaded modules such as java.xml.crypto be initialized from
# the runtime java.security configuration instead of being snapshotted by the libjvm image build.
#
# --initialize-at-run-time=jdk.internal.loader.ClassLoaders
# jdk.internal.loader.ClassLoaders needs initialize-at-run-time so that the jdk.internal.loader.ClassLoaders fields
# get set via ArchivedClassLoaders and adjusted with BuiltinClassLoader.setClassPath(URLClassPath)
